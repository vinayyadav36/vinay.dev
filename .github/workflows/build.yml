name: Build & Test
on: [push, pull_request]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: Frontend
      - name: TypeScript type-check
        run: npx tsc --noEmit
        working-directory: Frontend
      - name: Build
        run: npm run build
        working-directory: Frontend

  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: Backend/server/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: Backend/server
      - name: Smoke test all endpoints
        run: |
          node Backend/server/index.js &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:4000/api/health
          curl -sf http://localhost:4000/api/visitors
          TOKEN=$(curl -sf -X POST http://localhost:4000/api/admin/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"Admin@1234"}' | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          curl -sf -H "Authorization: Bearer $TOKEN" http://localhost:4000/api/admin/stats
          curl -sf http://localhost:4000/api/guestbook
          kill $SERVER_PID

  ml-scripts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run deploy check
        run: node scripts/mlai/deploy-check.js
      - name: Run SEO analyzer
        run: python3 scripts/mlai/seo-analyzer.py
        continue-on-error: true
      - name: Run content summarizer
        run: python3 scripts/mlai/content-summarizer.py
