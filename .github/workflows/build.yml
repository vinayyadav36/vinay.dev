name: Build, Lint & Test
on:
  push:
  pull_request:

jobs:
  frontend:
    name: Frontend – Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  backend:
    name: Backend – Test + Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: Backend/server/package-lock.json
      - run: npm ci
      - run: npm test
      - name: Smoke test live server
        working-directory: .
        run: |
          node Backend/server/index.js &
          SERVER_PID=$!
          sleep 4
          curl -sf http://localhost:4000/api/health
          TOKEN=$(curl -sf -X POST http://localhost:4000/api/admin/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"Admin@1234"}' \
            | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          test -n "$TOKEN"
          curl -sf -H "Authorization: Bearer $TOKEN" http://localhost:4000/api/admin/stats
          curl -sf http://localhost:4000/api/guestbook
          kill $SERVER_PID

  ml-scripts:
    name: ML/AI Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: node scripts/mlai/deploy-check.js
      - run: python3 scripts/mlai/seo-analyzer.py
        continue-on-error: true
      - run: python3 scripts/mlai/content-summarizer.py
      - run: node scripts/mlai/db-health-check.js --heal
