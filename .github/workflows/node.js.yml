# This workflow runs a quick DB health check — full CI is in build.yml
name: Node.js CI – Health Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  health:
    name: DB Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Run DB health check
        run: node scripts/mlai/db-health-check.js
