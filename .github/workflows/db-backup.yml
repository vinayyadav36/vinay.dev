name: DB Backup
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Stage DB files
        run: git add -f Backend/server/data/ 2>/dev/null || true
      - name: Commit backup
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --staged --quiet; then
            echo 'No DB changes to commit.'
            exit 0
          fi
          git commit -m "chore: auto DB backup $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:${{ github.ref_name }}
